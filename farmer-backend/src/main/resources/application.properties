spring.application.name=farmer-backend
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/farmer_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${APP_JWT_SECRET:VGhpc0lzQVN1ZmZpY2llbnRseUxvbmdCYXNlNjRTZWNyZXRLZXlGb3JKV1QxMjM0NTY=}
app.jwt.expiration-millis=${APP_JWT_EXPIRATION_MILLIS:86400000}
app.rate-limit.max-attempts=${APP_RATE_LIMIT_MAX_ATTEMPTS:5}
app.rate-limit.window-millis=${APP_RATE_LIMIT_WINDOW_MILLIS:60000}
